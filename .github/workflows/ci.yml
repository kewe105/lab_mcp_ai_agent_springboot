name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

defaults:
  run:
    working-directory: agent

jobs:
  build-test-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build & Test
        run: ./gradlew --no-daemon clean test

      - name: Docker Build (no push)
        run: docker build -t local/agent:ci .

  kubernetes:
    runs-on: ubuntu-latest
    needs: build-test-docker

    steps:
      - uses: actions/checkout@v4

      - name: Start Minikube
        uses: medyagh/setup-minikube@master

      - name: Verify cluster
        run: kubectl get nodes

      - name: Build Docker image inside Minikube
        run: |
          eval $(minikube -p minikube docker-env)
          docker build -t ai-agent:ci .

      - name: Deploy to Minikube
        run: kubectl apply -f src/main/k8s/ai-agent-deployment.yml

      - name: Wait for pod ready
        run: |
          kubectl wait --for=condition=Ready pod -l app=ai-agent --timeout=180s
          kubectl get pods
          minikube service list

      - name: Test service health endpoint
        run: |
          kubectl port-forward svc/ai-agent 8080:8080 &
          PF_PID=$!
          trap "kill $PF_PID 2>/dev/null || true" EXIT
          sleep 5
          for i in $(seq 1 6); do
            echo "Health check attempt $i/6..."
            if curl -fsS http://127.0.0.1:8080/actuator/health; then
              echo "Health check OK"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 6 attempts"
          exit 1

      - name: Log pods on failure
        if: failure()
        run: |
          kubectl get pods -o wide
          kubectl logs -l app=ai-agent --tail=200
